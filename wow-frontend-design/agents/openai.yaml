interface:
  display_name: "WOW Frontend Design"
  short_description: "整合 PM、UX、UI 與前端，建置、接手或重構網站"
  default_prompt: "使用 $wow-frontend-design 作為整合式 PM、UX、UI 與前端工程流程。先辨識新建或既有專案，以及使用者指定的全自動、半自動或指定模式；必要時先確認方向與重構深度。完成設計、實作、來源碼與瀏覽器視覺驗證，將可修復問題自動回送修正並重試。保留既有公開行為與最佳可用預覽；未執行的驗證必須標為 UNVERIFIED。只要求稽核時維持唯讀。"
policy:
  allow_implicit_invocation: true
