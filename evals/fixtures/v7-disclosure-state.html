<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8"><title>disclosure state fixture</title>
    <style>
      @keyframes wrapper-shift { from { transform: translateX(0); } to { transform: translateX(1px); } }
      .wrapper-css-motion { animation: wrapper-shift 10s linear infinite; }
    </style>
  </head>
  <body>
    <div id="button-slot"><button id="toggle" type="button" aria-expanded="false">Secret disclosure copy</button></div>
    <div id="panel-wrapper"><div id="panel" hidden>Secret panel copy</div></div>
    <script>
      const mode = new URL(location.href).searchParams.get("mode") || "correct";
      const slot = document.querySelector("#button-slot");
      let button = document.querySelector("#toggle");
      let panel = document.querySelector("#panel");
      const wrapper = document.querySelector("#panel-wrapper");
      if (mode === "unsupported") {
        const replacement = document.createElement("div");
        replacement.id = "toggle";
        replacement.tabIndex = 0;
        replacement.setAttribute("aria-expanded", "false");
        replacement.textContent = "Secret disclosure copy";
        button.replaceWith(replacement);
        button = replacement;
      } else if (mode === "shadow") {
        const host = document.createElement("div");
        panel.replaceWith(host);
        host.attachShadow({ mode: "open" }).append(panel);
      } else if (mode === "shadow-decoy") {
        const host = document.createElement("div");
        host.attachShadow({ mode: "open" }).innerHTML =
          '<button id="toggle" aria-expanded="false">Decoy</button><div id="panel">Decoy</div>';
        document.body.append(host);
      }
      if (mode === "role-link") button.setAttribute("role", "link");
      if (mode === "disabled") button.disabled = true;
      if (mode === "opacity0") panel.style.opacity = "0";
      if (mode === "display-contents") {
        panel.innerHTML = "<span>Secret panel copy</span>";
      }
      if (mode === "initial-bad") button.setAttribute("aria-expanded", "true");
      if (mode === "external") {
        const image = document.createElement("img");
        image.src = "https://external.invalid/disclosure-fixture.png";
        document.body.append(image);
      }
      const activate = () => {
        if (mode === "noop") return;
        if (mode !== "visual-only") button.setAttribute("aria-expanded", "true");
        if (mode !== "aria-only") panel.hidden = false;
        if (mode === "display-contents") panel.style.display = "contents";
        if (mode === "filter-opacity0") panel.style.filter = "opacity(0)";
        if (mode === "clip-hidden") panel.style.clipPath = "inset(50%)";
        if (mode === "animated") {
          panel.animate([{ opacity: 0.5 }, { opacity: 1 }], { duration: 10_000, iterations: Infinity });
        }
        if (mode === "ancestor-waapi") {
          wrapper.animate([{ transform: "translateX(0)" }, { transform: "translateX(1px)" }], {
            duration: 10_000,
            iterations: Infinity,
          });
        }
        if (mode === "ancestor-css") wrapper.classList.add("wrapper-css-motion");
      };
      button.addEventListener("click", activate);
      button.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") activate();
      });
    </script>
  </body>
</html>
