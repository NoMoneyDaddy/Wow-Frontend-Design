<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><title>invalid feedback fixture</title></head>
  <body>
    <div id="control-slot"><input id="control" type="text"></div>
    <button id="invalidate">Validate secret value</button>
    <p id="field-error" data-error>Secret validation copy</p>
    <script>
      const mode = new URL(location.href).searchParams.get("mode") || "describedby";
      const slot = document.querySelector("#control-slot");
      let control = document.querySelector("#control");
      if (mode === "textarea") {
        const replacement = document.createElement("textarea");
        replacement.id = "control";
        control.replaceWith(replacement);
        control = replacement;
      } else if (mode === "select") {
        const replacement = document.createElement("select");
        replacement.id = "control";
        replacement.innerHTML = '<option value="one">One</option><option value="two">Two</option>';
        control.replaceWith(replacement);
        control = replacement;
      } else if (mode === "unsupported") control.type = "password";
      else if (mode === "shadow") {
        const host = document.createElement("div");
        slot.replaceChildren(host);
        host.attachShadow({ mode: "open" }).append(control);
      }
      if (mode === "external") {
        const image = document.createElement("img");
        image.src = "https://external.invalid/feedback-fixture.png";
        document.body.append(image);
      }
      document.querySelector("#invalidate").addEventListener("click", () => {
        const error = document.querySelector("[data-error]");
        control.setAttribute("aria-invalid", mode === "invalid-false" ? "false" : "true");
        if (mode === "describedby") control.setAttribute("aria-describedby", "field-error");
        if (mode === "errormessage") control.setAttribute("aria-errormessage", "field-error");
        if (mode === "multi-errormessage") control.setAttribute("aria-errormessage", "field-error extra");
        if (mode === "both") {
          control.setAttribute("aria-describedby", "hint field-error");
          control.setAttribute("aria-errormessage", "field-error");
        }
        if (mode === "hidden-error") error.hidden = true;
        if (mode === "aria-hidden-error") error.setAttribute("aria-hidden", "true");
        if (mode === "aria-hidden-control") slot.setAttribute("aria-hidden", "true");
        if (mode === "inert-error") error.setAttribute("inert", "");
        if (mode === "empty-error") error.textContent = "";
        if (mode === "idless-error") error.removeAttribute("id");
        if (mode === "duplicate-id") {
          const duplicate = document.createElement("span");
          duplicate.id = "field-error";
          duplicate.textContent = "Duplicate secret copy";
          document.body.append(duplicate);
        }
      });
    </script>
  </body>
</html>
