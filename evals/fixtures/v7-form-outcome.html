<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><title>form outcome fixture</title></head>
  <body>
    <form id="fixture-form">
      <label>Secret field copy <input id="control" type="text" aria-invalid="false"></label>
      <button id="submit" type="button">Secret submit copy</button>
    </form>
    <div id="outcome-wrapper">
      <div id="success" hidden>Secret success copy</div>
      <div id="error" hidden>Secret error copy</div>
    </div>
    <script>
      const parameters = new URL(location.href).searchParams;
      const mode = parameters.get("mode") || "correct";
      const variant = parameters.get("variant") || "clean";
      const nativeMode = mode.startsWith("native-");
      const form = document.querySelector("#fixture-form");
      let control = document.querySelector("#control");
      const submit = document.querySelector("#submit");
      let success = document.querySelector("#success");
      let error = document.querySelector("#error");
      const wrapper = document.querySelector("#outcome-wrapper");
      if (nativeMode) {
        control.required = true;
        control.pattern = "eval-outcome-valid-[a-z0-9]+(?:-[a-z0-9]+)*";
        submit.type = "submit";
        if (mode === "native-novalidate") control.readOnly = true;
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          success.hidden = false;
        });
        if (mode === "native-correct") {
          const clearInvalidSuccess = () => {
            if (!control.validity.valid) success.hidden = true;
          };
          control.addEventListener("input", clearInvalidSuccess);
          control.addEventListener("invalid", clearInvalidSuccess);
        }
        if (mode === "native-clear-value") {
          control.addEventListener("invalid", () => { control.value = ""; });
        }
      }
      if (mode === "unsupported") {
        const replacement = document.createElement("div");
        replacement.id = "control";
        replacement.tabIndex = 0;
        control.replaceWith(replacement);
        control = replacement;
      } else if (mode === "shadow") {
        const host = document.createElement("div");
        error.replaceWith(host);
        host.attachShadow({ mode: "open" }).append(error);
      }
      if (mode === "initial") success.hidden = false;
      if (mode === "empty-success") success.textContent = "";
      if (mode === "empty-error") error.textContent = "";
      if (mode === "hidden-child-text") {
        success.innerHTML = "<span hidden>Secret success copy</span>";
        success.style.width = "20px";
        success.style.height = "20px";
      }
      if (mode === "child-complex-paint") success.innerHTML = "<span>Secret success copy</span>";
      if (mode === "external") {
        const image = document.createElement("img");
        image.src = "https://external.invalid/form-outcome.png";
        document.body.append(image);
      }
      if (!nativeMode) submit.addEventListener("click", () => {
        const value = control.value || "";
        if (value.startsWith("eval-outcome-valid-")) {
          control.setAttribute("aria-invalid", "false");
          error.hidden = true;
          if (mode !== "success") success.hidden = false;
          if (mode === "motion") {
            wrapper.animate([{ transform: "translateX(0)" }, { transform: "translateX(1px)" }], {
              duration: 10_000,
              iterations: Infinity,
            });
          }
          if (mode === "paint") success.style.filter = "opacity(0)";
          if (mode === "child-complex-paint") success.firstElementChild.style.filter = "blur(1px)";
          return;
        }
        if (value.startsWith("eval-outcome-invalid-")) {
          if (mode === "noop") return;
          control.setAttribute("aria-invalid", "true");
          error.hidden = false;
          const stale = mode === "stale" || (mode === "drift" && variant === "stale");
          const opacityOnly = mode === "visual-opacity-clean";
          if (opacityOnly) success.style.opacity = "0";
          else if (mode === "repurposed-success") success.textContent = "Secret replacement error copy";
          else if (!stale) success.hidden = true;
          if (mode === "clear-value") control.value = "";
        }
      });
    </script>
  </body>
</html>
