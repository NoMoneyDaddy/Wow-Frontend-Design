<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><title>stale completion fixture</title></head>
  <body>
    <button id="initiate">載入目前項目</button>
    <button id="interrupt">切換項目</button>
    <p id="pending" hidden>載入中</p>
    <p id="identity">alpha</p>
    <p id="success" hidden>完成</p>
    <p id="content">alpha-ready</p>
    <script>
      const mode = new URL(location.href).searchParams.get("mode") || "correct";
      let identity = "alpha";
      document.querySelector("#initiate").addEventListener("click", () => {
        if (mode !== "no-request") document.querySelector("#pending").hidden = mode === "no-pending";
        const load = () => fetch("/api/old?item=alpha", { method: mode === "method-mismatch" ? "POST" : "GET" }).then((response) => response.json()).then((payload) => {
          document.querySelector("#pending").hidden = true;
          if (mode === "stale" || identity === "alpha") {
            document.querySelector("#success").hidden = false;
            document.querySelector("#content").textContent = payload.content;
          }
          if (mode === "delayed-method-mismatch") {
            setTimeout(() => fetch("/api/old?item=alpha", { method: "POST" }).catch(() => {}), 500);
          }
        });
        if (mode !== "no-request") {
          load();
          if (mode === "duplicate") load();
          if (mode === "delayed-duplicate") setTimeout(load, 500);
        }
      });
      document.querySelector("#interrupt").addEventListener("click", () => {
        if (mode === "no-identity-change") return;
        identity = "beta";
        document.querySelector("#identity").textContent = identity;
        document.querySelector("#success").hidden = true;
        document.querySelector("#content").textContent = "beta-ready";
      });
    </script>
  </body>
</html>
