<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>繁中字體鑄造所樣張庫</title>
  <style>
    :root {
      --color-primary: #202020;
      --color-on-primary: #fff8f1;
      --color-canvas: #f4ebdd;
      --color-on-canvas: #201915;
      --color-surface: #fff9f4;
      --color-on-surface: #201915;
      --color-muted-surface: #e7d8c8;
      --color-on-muted-surface: #56453c;
      --shadow-soft: 0 18px 48px rgba(32, 25, 21, 0.08);
      --rule: rgba(32, 25, 21, 0.14);
      --rule-strong: rgba(32, 25, 21, 0.22);
      --focus: #a01f2d;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.5rem;
      --space-6: 2rem;
      --space-7: 3rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --font-display: "Iowan Old Style", "Baskerville", "Noto Serif TC", serif;
      --font-reading: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      --font-functional: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      --font-specimen: "Noto Serif TC", "Iowan Old Style", "PingFang TC", serif;
      --measure: 68ch;
      --max-shell: 76rem;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      color-scheme: light;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.62), transparent 38%),
        linear-gradient(180deg, #f8f1e7 0%, #efe2d1 100%);
      color: var(--color-on-canvas);
      font-family: var(--font-reading);
      line-height: 1.65;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15)),
        repeating-linear-gradient(
          180deg,
          rgba(32, 25, 21, 0.028) 0,
          rgba(32, 25, 21, 0.028) 1px,
          transparent 1px,
          transparent 28px
        );
      mix-blend-mode: multiply;
      opacity: 0.55;
    }

    .skip-link {
      position: absolute;
      inset-inline-start: var(--space-4);
      inset-block-start: var(--space-4);
      z-index: 20;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: var(--color-on-primary);
      text-decoration: none;
      transform: translateY(-180%);
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .page {
      position: relative;
      width: min(100%, var(--max-shell));
      margin: 0 auto;
      padding: max(var(--space-4), env(safe-area-inset-top)) var(--space-4) max(var(--space-5), env(safe-area-inset-bottom));
      min-inline-size: 0;
    }

    .masthead {
      display: grid;
      gap: var(--space-3);
      margin-block: var(--space-2) var(--space-5);
      padding: var(--space-4) var(--space-4) 0;
      min-inline-size: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      width: fit-content;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: var(--color-muted-surface);
      color: var(--color-on-muted-surface);
      font: 600 0.8rem/1.2 var(--font-functional);
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2.1rem, 4vw, 3.65rem);
      line-height: 1.05;
      letter-spacing: 0;
      max-inline-size: 13ch;
    }

    .summary {
      margin: 0;
      max-inline-size: var(--measure);
      font-size: 1.05rem;
      color: rgba(32, 25, 21, 0.85);
    }

    .workbench {
      display: grid;
      grid-template-columns: minmax(18rem, 0.92fr) minmax(0, 1.08fr);
      gap: var(--space-4);
      align-items: start;
      min-inline-size: 0;
    }

    .panel {
      position: relative;
      overflow: clip;
      border: 1px solid var(--rule);
      border-radius: var(--radius-xl);
      background: rgba(255, 249, 244, 0.88);
      box-shadow: var(--shadow-soft);
      min-inline-size: 0;
    }

    .panel__inner {
      padding: var(--space-5);
      min-inline-size: 0;
    }

    .panel--controls {
      display: grid;
      gap: var(--space-4);
      min-inline-size: 0;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin: 0 0 var(--space-3);
      font: 700 1rem/1.2 var(--font-functional);
      letter-spacing: 0.02em;
      min-inline-size: 0;
    }

    .status-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      min-inline-size: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(32, 25, 21, 0.08);
      background: var(--color-muted-surface);
      color: var(--color-on-muted-surface);
      font: 600 0.78rem/1.2 var(--font-functional);
      letter-spacing: 0.02em;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      min-inline-size: 0;
    }

    button {
      appearance: none;
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .button {
      min-height: 44px;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button:focus-visible,
    .copy-editor:focus-visible,
    .link-button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .button--primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }

    .button--secondary {
      background: var(--color-surface);
      color: var(--color-on-surface);
      border-color: rgba(32, 25, 21, 0.14);
    }

    .button[aria-pressed="true"] {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: transparent;
    }

    .button[aria-pressed="true"].button--secondary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }

    .inline-action[aria-pressed="true"] {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: transparent;
    }

    .copy-field {
      display: grid;
      gap: var(--space-2);
      min-inline-size: 0;
    }

    .field-label {
      font: 700 0.8rem/1.2 var(--font-functional);
      letter-spacing: 0.03em;
      color: rgba(32, 25, 21, 0.85);
    }

    .copy-editor {
      width: 100%;
      min-block-size: 12rem;
      resize: vertical;
      padding: 1rem 1.05rem;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(32, 25, 21, 0.16);
      background: rgba(255, 255, 255, 0.68);
      color: var(--color-on-surface);
      font: 1rem/1.7 var(--font-reading);
      letter-spacing: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
      min-inline-size: 0;
    }

    .specimen-panel {
      display: grid;
      gap: var(--space-4);
      min-inline-size: 0;
    }

    .specimen-frame {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-5);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.48)),
        var(--color-surface);
      border: 1px solid rgba(32, 25, 21, 0.12);
      border-radius: var(--radius-xl);
      min-inline-size: 0;
    }

    .specimen-label {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      font: 700 0.82rem/1.2 var(--font-functional);
      letter-spacing: 0.03em;
      text-transform: none;
    }

    .specimen-output {
      min-block-size: 24rem;
      padding: var(--space-5);
      border-radius: calc(var(--radius-xl) - 0.25rem);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.18)),
        var(--color-surface);
      color: var(--color-on-surface);
      border: 1px solid rgba(32, 25, 21, 0.13);
      white-space: pre-wrap;
      overflow: auto;
      font-family: var(--font-specimen);
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      line-height: 1.38;
      letter-spacing: 0;
      text-shadow: 0 0 0 transparent;
      transition: writing-mode 180ms ease, text-orientation 180ms ease, border-color 180ms ease;
      min-inline-size: 0;
      max-inline-size: 100%;
    }

    .specimen-output[data-outline="true"] {
      outline: 1px dashed rgba(32, 25, 21, 0.34);
      outline-offset: -0.6rem;
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(160, 31, 45, 0.10) 0,
          rgba(160, 31, 45, 0.10) 1px,
          transparent 1px,
          transparent 1.9em
        ),
        var(--color-surface);
    }

    .workbench[data-writing="vertical"] .specimen-output {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      max-inline-size: none;
      min-inline-size: 0;
      min-block-size: 26rem;
      max-block-size: 100%;
      line-height: 1.6;
      letter-spacing: 0;
    }

    .workbench[data-writing="vertical"] .specimen-output[data-outline="true"] {
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.14)),
        repeating-linear-gradient(
          90deg,
          rgba(160, 31, 45, 0.10) 0,
          rgba(160, 31, 45, 0.10) 1px,
          transparent 1px,
          transparent 1.9em
        ),
        var(--color-surface);
    }

    .fallback-note {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      background: var(--color-muted-surface);
      color: var(--color-on-muted-surface);
      font: 600 0.88rem/1.55 var(--font-functional);
      letter-spacing: 0.01em;
      min-inline-size: 0;
    }

    .fallback-note p {
      margin: 0;
    }

    .inline-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background: var(--color-surface);
      color: var(--color-on-surface);
      border: 1px solid rgba(32, 25, 21, 0.14);
      font: 700 0.78rem/1.1 var(--font-functional);
      letter-spacing: 0.03em;
      min-inline-size: 0;
      max-inline-size: 100%;
    }

    [hidden] { display: none !important; }

    @media (max-width: 900px) {
      .workbench {
        grid-template-columns: 1fr;
      }

      .panel__inner,
      .specimen-frame {
        padding: var(--space-4);
      }

      .specimen-output {
        min-block-size: 21rem;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding-inline: var(--space-3);
      }

      .masthead {
        padding-inline: 0;
      }

      .title {
        max-inline-size: 11ch;
      }

      .toolbar {
        flex-direction: column;
      }

      .button,
      .inline-action {
        width: 100%;
      }

      .specimen-output {
        font-size: clamp(1.25rem, 8vw, 1.75rem);
      }

      .workbench[data-writing="vertical"] .specimen-output {
        min-block-size: 20rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (forced-colors: active) {
      :root {
        --color-primary: CanvasText;
        --color-on-primary: Canvas;
        --color-canvas: Canvas;
        --color-on-canvas: CanvasText;
        --color-surface: Canvas;
        --color-on-surface: CanvasText;
        --color-muted-surface: Canvas;
        --color-on-muted-surface: CanvasText;
        --rule: CanvasText;
        --rule-strong: CanvasText;
        --focus: Highlight;
      }

      body::before,
      .panel,
      .specimen-frame,
      .copy-editor,
      .button,
      .chip,
      .fallback-note,
      .specimen-output,
      .inline-action {
        forced-color-adjust: auto;
        box-shadow: none;
      }

      .specimen-output {
        background: Canvas;
      }

      .button,
      .button--secondary,
      .inline-action {
        border: 1px solid ButtonText;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要內容</a>
  <div class="page">
    <header class="masthead">
      <span class="eyebrow">繁中字體鑄造所樣張庫</span>
      <h1 class="title">樣張、框線、橫直書比較</h1>
      <p class="summary">把繁中標點、英文、數字與 fallback 放進同一個校樣台，用真實版面檢查字形與字距，不把樣張藏進假卡片。</p>
    </header>

    <main id="main" class="workbench" data-eval="specimen-workspace" data-writing="horizontal" data-outline="false">
      <section class="panel panel--controls" aria-labelledby="controls-title">
        <div class="panel__inner">
          <div class="panel-title">
            <span id="controls-title">控制台</span>
            <div class="status-group" aria-label="目前狀態">
              <span class="chip" data-status-mode>橫書預覽</span>
              <span class="chip" data-status-outline>框線關閉</span>
            </div>
          </div>

          <div class="toolbar" aria-label="樣張控制">
            <button
              type="button"
              class="button button--primary"
              data-eval="writing-toggle"
              aria-pressed="false"
              aria-controls="specimen-preview"
            >切換為直書</button>
            <button
              type="button"
              class="button button--secondary"
              data-eval="outline-toggle"
              aria-pressed="false"
              aria-controls="specimen-preview"
            >顯示框線</button>
          </div>

          <div class="copy-field">
            <label class="field-label" for="specimen-editor">樣張內容</label>
            <textarea id="specimen-editor" class="copy-editor" rows="7">繁體中文標點，ABC 123，fallback 與字距。
「引號、頓號、分號」都要清楚。
直書與橫書都要能讀。</textarea>
          </div>

          <div class="fallback-note" data-eval="fallback-note" id="fallback-note">
            <p>fallback：窄螢幕上請優先回到橫書編修；直書只保留作比對，不把短樣張壓成一字寬長柱。</p>
          </div>
        </div>
      </section>

      <section class="panel specimen-panel" aria-labelledby="preview-title">
        <div class="panel__inner">
          <div class="panel-title">
            <span id="preview-title">樣張預覽</span>
            <div class="status-group" aria-label="預覽資訊">
              <span class="chip">繁中字形</span>
              <span class="chip">即時同步</span>
            </div>
          </div>

          <div class="specimen-frame">
            <div class="specimen-label">
              <span>校樣紙</span>
              <button type="button" class="inline-action" data-eval="outline-toggle" aria-pressed="false" aria-controls="specimen-preview">切換框線</button>
            </div>
            <div
              id="specimen-preview"
              class="specimen-output"
              data-eval="specimen"
              aria-live="polite"
              aria-label="樣張預覽"
            ></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const workbench = document.querySelector('[data-eval="specimen-workspace"]');
      const writingToggle = document.querySelector('[data-eval="writing-toggle"]');
      const outlineToggles = Array.from(document.querySelectorAll('[data-eval="outline-toggle"]'));
      const editor = document.getElementById('specimen-editor');
      const specimen = document.querySelector('[data-eval="specimen"]');
      const modeChip = document.querySelector('[data-status-mode]');
      const outlineChip = document.querySelector('[data-status-outline]');
      const fallbackNote = document.querySelector('[data-eval="fallback-note"]');
      const previewTitle = document.getElementById('preview-title');

      if (!workbench || !writingToggle || !editor || !specimen) return;

      const state = {
        writing: 'horizontal',
        outline: false
      };

      const specimenCopy = () => editor.value.replace(/\n{3,}/g, '\n\n').trimEnd();

      const mobilePrompt = () => window.matchMedia('(max-width: 640px)').matches;

      const syncSpecimen = () => {
        specimen.textContent = specimenCopy();
      };

      const syncWriting = () => {
        const isVertical = state.writing === 'vertical';
        workbench.dataset.writing = state.writing;
        writingToggle.setAttribute('aria-pressed', String(isVertical));
        writingToggle.textContent = isVertical ? '回到橫書' : '切換為直書';
        modeChip.textContent = isVertical ? '直書預覽' : '橫書預覽';
        previewTitle.textContent = isVertical ? '直書預覽' : '樣張預覽';
        if (mobilePrompt()) {
          fallbackNote.innerHTML = isVertical
            ? '<p>fallback：現在是直書預覽。若要編修，請按「回到橫書」回到較好輸入的版面。</p><button type="button" class="inline-action" data-fallback-return>回到橫書編修</button>'
            : '<p>fallback：窄螢幕上請優先回到橫書編修；直書只保留作比對，不把短樣張壓成一字寬長柱。</p>';
        } else {
          fallbackNote.innerHTML = isVertical
            ? '<p>fallback：直書預覽已啟用；若要精修，仍可回到橫書比較標點、英文與數字。</p>'
            : '<p>fallback：窄螢幕上請優先回到橫書編修；直書只保留作比對，不把短樣張壓成一字寬長柱。</p>';
        }
      };

      const syncOutline = () => {
        const next = String(state.outline);
        workbench.dataset.outline = next;
        specimen.dataset.outline = next;
        outlineToggles.forEach((button) => button.setAttribute('aria-pressed', next));
        outlineChip.textContent = state.outline ? '框線開啟' : '框線關閉';
        outlineToggles.forEach((button) => {
          button.textContent = state.outline ? '隱藏框線' : '顯示框線';
        });
      };

      const setWriting = (next) => {
        state.writing = next;
        syncWriting();
      };

      const setOutline = (next) => {
        state.outline = next;
        syncOutline();
      };

      writingToggle.addEventListener('click', () => {
        setWriting(state.writing === 'horizontal' ? 'vertical' : 'horizontal');
      });

      outlineToggles.forEach((button) => {
        button.addEventListener('click', () => {
          setOutline(!state.outline);
        });
      });

      fallbackNote.addEventListener('click', (event) => {
        const button = event.target.closest('[data-fallback-return]');
        if (!button) return;
        setWriting('horizontal');
        writingToggle.focus();
      });

      editor.addEventListener('input', syncSpecimen);
      window.addEventListener('resize', syncWriting, { passive: true });

      syncSpecimen();
      syncWriting();
      syncOutline();
    })();
  </script>
</body>
</html>
