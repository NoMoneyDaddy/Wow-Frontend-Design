<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="精選書籍，值得信賴的書局。發現您的下一本書。">
  <meta name="color-scheme" content="light dark">
  <title>書局 — 精選書籍</title>
  <style>
    :root {
      --color-primary: #2C2416;
      --color-on-primary: #FFFFFF;
      --color-surface: #FAF8F3;
      --color-on-surface: #2C2416;
      --color-surface-variant: #F0EDE6;
      --color-on-surface-variant: #59574E;
      --color-accent: #C4732F;
      --color-on-accent: #FFFFFF;
      --color-success: #4CAF50;
      --color-error: #D32F2F;
      --color-focus: #2C2416;

      --font-serif: "Georgia", "Times New Roman", serif;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-xxl: 48px;

      --radius-none: 0px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --duration-fast: 140ms;
      --duration-base: 260ms;
      --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);

      font-size: 16px;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #F5F3F0;
        --color-on-primary: #1A1816;
        --color-surface: #2C2A26;
        --color-on-surface: #F5F3F0;
        --color-surface-variant: #3C3A35;
        --color-on-surface-variant: #B5B1AA;
        --color-accent: #D89B4F;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: var(--color-primary);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
      transition: background-color var(--duration-base) var(--ease-out),
                  color var(--duration-base) var(--ease-out);
    }

    /* Skip link */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background-color: var(--color-accent);
      color: var(--color-on-accent);
      padding: var(--space-sm) var(--space-md);
      text-decoration: none;
      z-index: 100;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Header & Navigation */
    header {
      background-color: var(--color-primary);
      color: var(--color-on-primary);
      padding: var(--space-lg) var(--space-md);
      border-bottom: 1px solid var(--color-surface-variant);
      position: sticky;
      top: 0;
      z-index: 50;
      transition: background-color var(--duration-base) var(--ease-out);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-lg);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      color: inherit;
    }

    nav {
      display: flex;
      gap: var(--space-xl);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: var(--color-on-primary);
      text-decoration: none;
      padding: var(--space-sm) 0;
      border-bottom: 2px solid transparent;
      transition: border-color var(--duration-base) var(--ease-out);
      position: relative;
    }

    nav a:hover,
    nav a:focus {
      border-bottom-color: var(--color-accent);
      outline: none;
    }

    nav a.current {
      border-bottom-color: var(--color-accent);
    }

    /* Mobile nav toggle */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--color-on-primary);
      font-size: 24px;
      cursor: pointer;
      padding: var(--space-sm);
    }

    @media (max-width: 767px) {
      nav {
        display: none;
        position: fixed;
        inset: 0;
        background-color: var(--color-primary);
        flex-direction: column;
        gap: var(--space-xl);
        padding: var(--space-xxl) var(--space-lg);
        z-index: 40;
      }

      nav[aria-expanded="true"] {
        display: flex;
      }

      .nav-toggle {
        display: block;
      }
    }

    /* Main content */
    main {
      background-color: var(--color-surface);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-lg);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: var(--space-xxl) var(--space-lg);
      background: linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-variant) 100%);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-xxl);
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      margin: 0 0 var(--space-md) 0;
      line-height: 1.2;
      color: var(--color-primary);
    }

    .hero p {
      font-size: clamp(14px, 3vw, 18px);
      color: var(--color-on-surface-variant);
      max-width: 600px;
      margin: 0 auto var(--space-lg);
      line-height: 1.5;
    }

    .hero-cta {
      display: inline-block;
      background-color: var(--color-accent);
      color: var(--color-on-accent);
      padding: 12px 32px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 500;
      transition: background-color var(--duration-base) var(--ease-out),
                  transform var(--duration-base) var(--ease-out);
      border: 2px solid transparent;
    }

    .hero-cta:hover {
      background-color: #A85F2A;
    }

    .hero-cta:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-color: var(--color-primary);
    }

    .hero-cta:active {
      background-color: #8B4F22;
    }

    /* Section */
    section {
      margin-bottom: var(--space-xxl);
    }

    h2 {
      font-family: var(--font-serif);
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700;
      margin: 0 0 var(--space-lg) 0;
      color: var(--color-primary);
    }

    /* Featured books grid */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    @media (max-width: 767px) {
      .books-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: var(--space-md);
      }
    }

    .book-card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-surface-variant);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-decoration: none;
      color: var(--color-on-surface);
      transition: transform var(--duration-base) var(--ease-out),
                  box-shadow var(--duration-base) var(--ease-out);
      display: block;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .book-card:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .book-card:hover {
        transform: none;
      }
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, var(--color-surface-variant), var(--color-on-surface-variant));
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--color-on-surface-variant);
    }

    .book-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 var(--space-sm) 0;
      line-height: 1.4;
    }

    .book-author {
      font-size: 13px;
      color: var(--color-on-surface-variant);
      margin: 0 0 var(--space-sm) 0;
    }

    .book-price {
      font-weight: 600;
      color: var(--color-accent);
      margin: 0;
      font-size: 14px;
    }

    /* Categories */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .category-link {
      padding: 8px 16px;
      background-color: var(--color-surface-variant);
      color: var(--color-on-surface);
      text-decoration: none;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      transition: background-color var(--duration-base) var(--ease-out),
                  color var(--duration-base) var(--ease-out);
    }

    .category-link:hover,
    .category-link:focus {
      background-color: var(--color-accent);
      color: var(--color-on-accent);
      outline: none;
      border-color: var(--color-primary);
    }

    /* Footer */
    footer {
      background-color: var(--color-primary);
      color: var(--color-on-primary);
      padding: var(--space-xl) var(--space-lg);
      margin-top: var(--space-xxl);
      border-top: 1px solid var(--color-surface-variant);
      text-align: center;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    footer nav {
      gap: var(--space-lg);
      justify-content: center;
      margin-bottom: var(--space-lg);
    }

    footer a {
      color: var(--color-on-primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--duration-base) var(--ease-out);
    }

    footer a:hover {
      border-bottom-color: var(--color-accent);
    }

    .footer-meta {
      font-size: 13px;
      color: var(--color-on-surface-variant);
      margin-top: var(--space-lg);
    }

    /* Mobile bottom nav */
    @media (max-width: 767px) {
      body {
        padding-bottom: 60px;
      }

      footer nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: var(--color-surface);
        border-top: 1px solid var(--color-surface-variant);
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: space-around;
        gap: 0;
        height: 60px;
        z-index: 30;
      }

      footer nav a {
        flex: 1;
        padding: 8px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--color-on-surface);
        border-bottom: none;
        border-top: 2px solid transparent;
      }

      footer nav a:hover,
      footer nav a:focus {
        border-top-color: var(--color-accent);
        color: var(--color-accent);
        background-color: rgba(196, 115, 47, 0.05);
      }

      .footer-meta {
        padding: var(--space-lg) var(--space-md) var(--space-xl);
        display: none;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (prefers-contrast: more) {
      .book-card,
      .hero {
        border-width: 2px;
      }
    }

    @media (prefers-color-scheme: dark) {
      header {
        border-bottom-color: var(--color-surface-variant);
      }

      footer {
        border-top-color: var(--color-surface-variant);
      }

      @media (max-width: 767px) {
        footer nav {
          background-color: var(--color-primary);
          border-top-color: var(--color-surface-variant);
        }

        footer nav a {
          color: var(--color-on-primary);
        }

        footer nav a:hover,
        footer nav a:focus {
          color: var(--color-accent);
          background-color: rgba(216, 155, 79, 0.1);
        }
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">跳至主要內容</a>

  <header>
    <div class="header-content">
      <a href="/" class="logo">書局</a>
      <button class="nav-toggle" aria-label="打開導航菜單" aria-expanded="false" id="nav-toggle">☰</button>
      <nav id="main-nav" aria-label="主導航">
        <a href="/" class="current">首頁</a>
        <a href="/catalog.html">書籍目錄</a>
        <a href="#about">關於我們</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container">
      <section class="hero">
        <h1>發現您的下一本書</h1>
        <p>精選書籍，來自世界各地的最佳作品。我們的書局致力於為每位讀者尋找完美的故事。</p>
        <a href="/catalog.html" class="hero-cta">瀏覽書籍</a>
      </section>

      <section>
        <h2>分類瀏覽</h2>
        <nav class="categories" aria-label="書籍分類">
          <a href="/catalog.html?category=fiction" class="category-link">文學小說</a>
          <a href="/catalog.html?category=mystery" class="category-link">推理懸疑</a>
          <a href="/catalog.html?category=science" class="category-link">科學知識</a>
          <a href="/catalog.html?category=history" class="category-link">歷史傳記</a>
          <a href="/catalog.html?category=poetry" class="category-link">詩集散文</a>
        </nav>
      </section>

      <section>
        <h2>精選推薦</h2>
        <div class="books-grid">
          <a href="/book.html?id=1" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">月光下的歌聲</h3>
            <p class="book-author">李明翔</p>
            <p class="book-price">NT$380</p>
          </a>
          <a href="/book.html?id=2" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">時間的秘密</h3>
            <p class="book-author">張欣怡</p>
            <p class="book-price">NT$420</p>
          </a>
          <a href="/book.html?id=3" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">山脈之心</h3>
            <p class="book-author">王俊傑</p>
            <p class="book-price">NT$350</p>
          </a>
          <a href="/book.html?id=4" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">海邊的回憶</h3>
            <p class="book-author">陳思涵</p>
            <p class="book-price">NT$390</p>
          </a>
          <a href="/book.html?id=5" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">城市的故事</h3>
            <p class="book-author">黃美琴</p>
            <p class="book-price">NT$360</p>
          </a>
          <a href="/book.html?id=6" class="book-card">
            <div class="book-cover">封面</div>
            <h3 class="book-title">夢中的對話</h3>
            <p class="book-author">劉志偉</p>
            <p class="book-price">NT$400</p>
          </a>
        </div>
        <div style="text-align: center; margin-top: var(--space-lg);">
          <a href="/catalog.html" class="hero-cta">查看全部書籍</a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <nav aria-label="頁腳導航">
        <a href="/catalog.html">書籍</a>
        <a href="#about">關於</a>
        <a href="#contact">聯絡</a>
      </nav>
      <div class="footer-meta">
        <p>&copy; 2025 書局 — 精選書籍。保留一切權利。</p>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', function() {
      const nav = document.getElementById('main-nav');
      const isExpanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !isExpanded);
      if (!isExpanded) {
        nav.setAttribute('aria-expanded', 'true');
      } else {
        nav.removeAttribute('aria-expanded');
      }
    });

    // Close menu when a link is clicked
    document.getElementById('main-nav').addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        document.getElementById('nav-toggle').setAttribute('aria-expanded', 'false');
        this.removeAttribute('aria-expanded');
      }
    });

    // Close menu on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const toggle = document.getElementById('nav-toggle');
        if (toggle.getAttribute('aria-expanded') === 'true') {
          toggle.setAttribute('aria-expanded', 'false');
          document.getElementById('main-nav').removeAttribute('aria-expanded');
        }
      }
    });
  </script>
</body>
</html>
