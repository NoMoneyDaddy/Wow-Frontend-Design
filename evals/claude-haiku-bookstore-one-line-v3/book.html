<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="購買精選書籍。詳細資訊、評價和快速結帳。">
  <meta name="color-scheme" content="light dark">
  <title>書籍詳情 — 書局</title>
  <style>
    :root {
      --color-primary: #2C2416;
      --color-on-primary: #FFFFFF;
      --color-surface: #FAF8F3;
      --color-on-surface: #2C2416;
      --color-surface-variant: #F0EDE6;
      --color-on-surface-variant: #59574E;
      --color-accent: #C4732F;
      --color-on-accent: #FFFFFF;
      --color-success: #4CAF50;
      --color-error: #D32F2F;

      --font-serif: "Georgia", "Times New Roman", serif;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-xxl: 48px;

      --radius-sm: 4px;
      --radius-md: 8px;

      --duration-base: 260ms;
      --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);

      font-size: 16px;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #F5F3F0;
        --color-on-primary: #1A1816;
        --color-surface: #2C2A26;
        --color-on-surface: #F5F3F0;
        --color-surface-variant: #3C3A35;
        --color-on-surface-variant: #B5B1AA;
        --color-accent: #D89B4F;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: var(--color-primary);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background-color: var(--color-accent);
      color: var(--color-on-accent);
      padding: var(--space-sm) var(--space-md);
      text-decoration: none;
      z-index: 100;
    }

    .skip-link:focus {
      top: 0;
    }

    header {
      background-color: var(--color-primary);
      color: var(--color-on-primary);
      padding: var(--space-lg) var(--space-md);
      border-bottom: 1px solid var(--color-surface-variant);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-lg);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      color: inherit;
    }

    nav {
      display: flex;
      gap: var(--space-xl);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: var(--color-on-primary);
      text-decoration: none;
      padding: var(--space-sm) 0;
      border-bottom: 2px solid transparent;
      transition: border-color var(--duration-base) var(--ease-out);
    }

    nav a:hover,
    nav a:focus {
      border-bottom-color: var(--color-accent);
      outline: none;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--color-on-primary);
      font-size: 24px;
      cursor: pointer;
      padding: var(--space-sm);
    }

    @media (max-width: 767px) {
      nav {
        display: none;
        position: fixed;
        inset: 0;
        background-color: var(--color-primary);
        flex-direction: column;
        gap: var(--space-xl);
        padding: var(--space-xxl) var(--space-lg);
        z-index: 40;
      }

      nav[aria-expanded="true"] {
        display: flex;
      }

      .nav-toggle {
        display: block;
      }
    }

    main {
      background-color: var(--color-surface);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-lg);
    }

    .breadcrumb {
      font-size: 14px;
      color: var(--color-on-surface-variant);
      margin-bottom: var(--space-lg);
    }

    .breadcrumb a {
      color: var(--color-accent);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .product-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: var(--space-xxl);
      margin-bottom: var(--space-xxl);
    }

    @media (max-width: 767px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: var(--space-lg);
      }

      body {
        padding-bottom: 60px;
      }
    }

    .book-cover-large {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, var(--color-surface-variant), var(--color-on-surface-variant));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--color-on-surface-variant);
      border: 1px solid var(--color-surface-variant);
    }

    .product-info h1 {
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      margin: 0 0 var(--space-md) 0;
      line-height: 1.2;
      color: var(--color-primary);
    }

    .product-meta {
      display: flex;
      gap: var(--space-lg);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      align-items: center;
    }

    .author {
      font-size: 16px;
      color: var(--color-on-surface-variant);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 14px;
    }

    .stars {
      color: var(--color-accent);
      letter-spacing: 2px;
    }

    .price-section {
      border-top: 1px solid var(--color-surface-variant);
      border-bottom: 1px solid var(--color-surface-variant);
      padding: var(--space-lg) 0;
      margin-bottom: var(--space-lg);
    }

    .price {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-accent);
      margin: 0;
    }

    .availability {
      font-size: 14px;
      color: var(--color-success);
      margin-top: var(--space-sm);
    }

    .availability.out-of-stock {
      color: var(--color-error);
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    .quantity-label {
      font-size: 14px;
      font-weight: 500;
    }

    .quantity-input {
      width: 70px;
      padding: 8px;
      border: 1px solid var(--color-on-surface-variant);
      border-radius: var(--radius-sm);
      font-size: 16px;
      text-align: center;
    }

    .quantity-input:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .action-buttons {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    @media (max-width: 767px) {
      .action-buttons {
        flex-direction: column;
      }
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: background-color var(--duration-base) var(--ease-out);
      border: 2px solid transparent;
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: var(--color-on-accent);
    }

    .btn-primary:hover {
      background-color: #A85F2A;
    }

    .btn-primary:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-color: var(--color-primary);
    }

    .btn-secondary {
      background-color: var(--color-surface-variant);
      color: var(--color-on-surface);
      border: 1px solid var(--color-on-surface-variant);
    }

    .btn-secondary:hover {
      background-color: var(--color-on-surface-variant);
      color: var(--color-surface);
    }

    .btn-secondary:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .description {
      font-size: 14px;
      line-height: 1.8;
      color: var(--color-on-surface);
      margin-bottom: var(--space-lg);
      padding: var(--space-lg);
      background-color: rgba(196, 115, 47, 0.05);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--color-accent);
    }

    .details-section {
      margin-bottom: var(--space-xl);
    }

    .details-section h2 {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 var(--space-md) 0;
      color: var(--color-primary);
    }

    .details-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .details-list li {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-surface-variant);
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: var(--space-md);
    }

    .details-list li:last-child {
      border-bottom: none;
    }

    .details-label {
      font-weight: 600;
      color: var(--color-on-surface-variant);
      font-size: 14px;
    }

    .details-value {
      color: var(--color-on-surface);
      font-size: 14px;
    }

    .related-books {
      margin-top: var(--space-xxl);
      padding-top: var(--space-xxl);
      border-top: 1px solid var(--color-surface-variant);
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-lg);
      margin-top: var(--space-lg);
    }

    @media (max-width: 767px) {
      .books-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .book-card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-surface-variant);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-decoration: none;
      color: var(--color-on-surface);
      transition: transform var(--duration-base) var(--ease-out);
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: translateY(-2px);
    }

    .book-card:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, var(--color-surface-variant), var(--color-on-surface-variant));
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--color-on-surface-variant);
    }

    .book-title {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 4px 0;
      line-height: 1.4;
    }

    .book-author {
      font-size: 12px;
      color: var(--color-on-surface-variant);
      margin: 0 0 var(--space-sm) 0;
    }

    .book-price {
      font-weight: 600;
      color: var(--color-accent);
      margin: 0;
      font-size: 13px;
    }

    footer {
      background-color: var(--color-primary);
      color: var(--color-on-primary);
      padding: var(--space-xl) var(--space-lg);
      margin-top: var(--space-xxl);
      border-top: 1px solid var(--color-surface-variant);
      text-align: center;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    footer nav {
      gap: var(--space-lg);
      justify-content: center;
      margin-bottom: var(--space-lg);
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    footer a {
      color: var(--color-on-primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--duration-base) var(--ease-out);
    }

    footer a:hover {
      border-bottom-color: var(--color-accent);
    }

    .footer-meta {
      font-size: 13px;
      color: var(--color-on-surface-variant);
      margin-top: var(--space-lg);
    }

    @media (max-width: 767px) {
      footer nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: var(--color-surface);
        border-top: 1px solid var(--color-surface-variant);
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: space-around;
        gap: 0;
        height: 60px;
        z-index: 30;
      }

      footer nav a {
        flex: 1;
        padding: 8px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--color-on-surface);
        border-bottom: none;
        border-top: 2px solid transparent;
      }

      footer nav a:hover,
      footer nav a:focus {
        border-top-color: var(--color-accent);
        color: var(--color-accent);
        background-color: rgba(196, 115, 47, 0.05);
      }

      .footer-meta {
        padding: var(--space-lg) var(--space-md) var(--space-xl);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (prefers-contrast: more) {
      .details-list li,
      .description {
        border-width: 2px;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">跳至主要內容</a>

  <header>
    <div class="header-content">
      <a href="/" class="logo">書局</a>
      <button class="nav-toggle" aria-label="打開導航菜單" aria-expanded="false" id="nav-toggle">☰</button>
      <nav id="main-nav" aria-label="主導航">
        <a href="/">首頁</a>
        <a href="/catalog.html">書籍目錄</a>
        <a href="/#about">關於我們</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container">
      <div class="breadcrumb">
        <a href="/">首頁</a> / <a href="/catalog.html">書籍目錄</a> / <span id="breadcrumb-title">書籍詳情</span>
      </div>

      <div class="product-layout">
        <div>
          <div class="book-cover-large">封面圖片</div>
        </div>

        <div class="product-info">
          <h1 id="product-title">月光下的歌聲</h1>

          <div class="product-meta">
            <span class="author">作者：<span id="product-author">李明翔</span></span>
            <div class="rating">
              <span class="stars" id="product-rating">★★★★★</span>
              <span id="product-reviews">4.5 (128 則評價)</span>
            </div>
          </div>

          <div class="price-section">
            <p class="price" id="product-price">NT$380</p>
            <p class="availability" id="product-availability">現貨供應</p>
          </div>

          <p class="description" id="product-description">
            這是一部詩意而深刻的文學作品，探討人生的意義與情感的本質。透過細膩的文筆和深遠的思想，帶領讀者進入月光下的靜謐世界。
          </p>

          <div class="quantity-control">
            <label class="quantity-label" for="quantity">數量：</label>
            <input type="number" id="quantity" class="quantity-input" value="1" min="1" max="10">
          </div>

          <div class="action-buttons">
            <button class="btn btn-primary" id="add-to-cart">加入購物車</button>
            <button class="btn btn-secondary" id="wishlist-btn">♡ 加入收藏</button>
          </div>

          <div class="details-section">
            <h2>書籍資訊</h2>
            <ul class="details-list">
              <li>
                <span class="details-label">出版社</span>
                <span class="details-value" id="product-publisher">精選書局出版</span>
              </li>
              <li>
                <span class="details-label">出版年份</span>
                <span class="details-value" id="product-year">2024</span>
              </li>
              <li>
                <span class="details-label">頁數</span>
                <span class="details-value" id="product-pages">304 頁</span>
              </li>
              <li>
                <span class="details-label">語言</span>
                <span class="details-value">繁體中文</span>
              </li>
              <li>
                <span class="details-label">ISBN</span>
                <span class="details-value" id="product-isbn">978-9999999999</span>
              </li>
              <li>
                <span class="details-label">裝訂方式</span>
                <span class="details-value">精裝</span>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="related-books">
        <h2>其他推薦書籍</h2>
        <div class="books-grid" id="related-grid">
          <!-- Related books will be rendered here -->
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <nav aria-label="頁腳導航">
        <a href="/catalog.html">書籍</a>
        <a href="/#about">關於</a>
        <a href="/#contact">聯絡</a>
      </nav>
      <div class="footer-meta">
        <p>&copy; 2025 書局 — 精選書籍。保留一切權利。</p>
      </div>
    </div>
  </footer>

  <script>
    // Book data
    const allBooks = [
      { id: 1, title: "月光下的歌聲", author: "李明翔", price: 380, category: "fiction", rating: 4.5, reviews: 128, publisher: "精選書局出版", year: 2024, pages: 304, isbn: "978-9999999999" },
      { id: 2, title: "時間的秘密", author: "張欣怡", price: 420, category: "science", rating: 4.3, reviews: 95, publisher: "科學出版社", year: 2023, pages: 288, isbn: "978-9999999998" },
      { id: 3, title: "山脈之心", author: "王俊傑", price: 350, category: "fiction", rating: 4.7, reviews: 156, publisher: "精選書局出版", year: 2024, pages: 320, isbn: "978-9999999997" },
      { id: 4, title: "海邊的回憶", author: "陳思涵", price: 390, category: "poetry", rating: 4.4, reviews: 142, publisher: "詩集出版", year: 2023, pages: 256, isbn: "978-9999999996" },
      { id: 5, title: "城市的故事", author: "黃美琴", price: 360, category: "fiction", rating: 4.6, reviews: 167, publisher: "精選書局出版", year: 2024, pages: 312, isbn: "978-9999999995" },
      { id: 6, title: "夢中的對話", author: "劉志偉", price: 400, category: "mystery", rating: 4.2, reviews: 118, publisher: "懸疑小說社", year: 2023, pages: 344, isbn: "978-9999999994" },
    ];

    const params = new URLSearchParams(window.location.search);
    const bookId = parseInt(params.get('id')) || 1;
    const book = allBooks.find(b => b.id === bookId) || allBooks[0];
    const related = allBooks.filter(b => b.id !== bookId).slice(0, 4);

    // Update page content
    document.getElementById('product-title').textContent = book.title;
    document.getElementById('breadcrumb-title').textContent = book.title;
    document.getElementById('product-author').textContent = book.author;
    document.getElementById('product-price').textContent = `NT$${book.price}`;
    document.getElementById('product-reviews').textContent = `${book.rating} (${book.reviews} 則評價)`;
    document.getElementById('product-publisher').textContent = book.publisher;
    document.getElementById('product-year').textContent = book.year;
    document.getElementById('product-pages').textContent = `${book.pages} 頁`;
    document.getElementById('product-isbn').textContent = `978-${Math.random().toString().slice(2, 11)}`;

    const stars = Math.round(book.rating);
    document.getElementById('product-rating').textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

    // Render related books
    const grid = document.getElementById('related-grid');
    related.forEach(b => {
      const card = document.createElement('a');
      card.href = `/book.html?id=${b.id}`;
      card.className = 'book-card';
      card.innerHTML = `
        <div class="book-cover">封面</div>
        <h3 class="book-title">${b.title}</h3>
        <p class="book-author">${b.author}</p>
        <p class="book-price">NT$${b.price}</p>
      `;
      grid.appendChild(card);
    });

    // Button interactions
    document.getElementById('add-to-cart').addEventListener('click', () => {
      const qty = document.getElementById('quantity').value;
      alert(`已將 ${qty} 本《${book.title}》加入購物車！`);
    });

    document.getElementById('wishlist-btn').addEventListener('click', (e) => {
      e.target.style.color = e.target.style.color === 'rgb(196, 115, 47)' ? '' : 'rgb(196, 115, 47)';
      alert(e.target.style.color ? `已將《${book.title}》加入收藏！` : `已從收藏移除《${book.title}》。`);
    });

    // Navigation
    document.getElementById('nav-toggle').addEventListener('click', function() {
      const isExpanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !isExpanded);
      if (!isExpanded) {
        document.getElementById('main-nav').setAttribute('aria-expanded', 'true');
      } else {
        document.getElementById('main-nav').removeAttribute('aria-expanded');
      }
    });

    document.getElementById('main-nav').addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        document.getElementById('nav-toggle').setAttribute('aria-expanded', 'false');
        this.removeAttribute('aria-expanded');
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('nav-toggle').getAttribute('aria-expanded') === 'true') {
        document.getElementById('nav-toggle').setAttribute('aria-expanded', 'false');
        document.getElementById('main-nav').removeAttribute('aria-expanded');
      }
    });
  </script>
</body>
</html>
